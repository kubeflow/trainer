name: Release

on:
  push:
    branches:
      - master
      - release-*
    paths:
      - VERSION

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SEMVER_PATTERN: '^(v)?([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      branch: ${{ steps.vars.outputs.branch }}
      is-prerelease: ${{ steps.vars.outputs.is-prerelease }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version and set outputs
        id: vars
        run: |
          RAW_VERSION=$(cat VERSION | tr -d ' \n')
          VERSION=${RAW_VERSION#v}
          if [[ ! ${RAW_VERSION} =~ ${{ env.SEMVER_PATTERN }} ]]; then
            echo "Version '${RAW_VERSION}' does not match semver pattern."
            exit 1
          fi

          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          BRANCH="release-${MAJOR_MINOR}"
          TAG="v${VERSION}"
          IS_PRERELEASE=false
          if [[ ${VERSION} == *"-rc."* ]]; then
            IS_PRERELEASE=true
          fi

          echo "Version '${RAW_VERSION}' matches semver pattern."
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "is-prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

  tests:
    needs:
      - prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go unit tests
        run: make test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python unit tests
        run: make test-python

  build_python_api:
    needs:
      - prepare
      - update_release_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build Python package
        working-directory: api/python_api
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist-${{ needs.prepare.outputs.version }}
          path: api/python_api/dist/

  update_release_branch:
    needs:
      - prepare
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Create or checkout release branch
        run: |
          BRANCH="${{ needs.prepare.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "Release branch $BRANCH already exists, checking it out."
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            echo "Creating release branch $BRANCH from $GITHUB_SHA"
            git checkout -b "$BRANCH" "$GITHUB_SHA"
          fi

      - name: Update assets on release branch
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          # Update Helm chart version.
          sed -i "s/^version: .*/version: ${VERSION}/" charts/kubeflow-trainer/Chart.yaml
          echo "Updated Helm chart version to $VERSION"

          # Update newTag in all manifest kustomization files.
          find manifests -type f -name '*.yaml' -exec sed -i "s/newTag: .*/newTag: $TAG/" {} +
          echo "Updated image tags in manifests to $TAG"

          # Pin ghcr.io image references from :latest to the release tag.
          CHANGED_FILES=$(grep -REl "ghcr\.io/kubeflow/trainer/[A-Za-z0-9._/-]+:latest" manifests || true)
          if [ -n "$CHANGED_FILES" ]; then
            while IFS= read -r f; do
              sed -i -E "s|(ghcr\.io/kubeflow/trainer/[A-Za-z0-9._/-]+):latest|\\1:${TAG}|g" "$f"
              echo "  Pinned $f"
            done <<< "$CHANGED_FILES"
          fi

          # Update configMapGenerator version in manager overlay.
          sed -i "s/kubeflow_trainer_version=.*/kubeflow_trainer_version=${TAG}/" \
            manifests/overlays/manager/kustomization.yaml
          echo "Updated configMapGenerator version to $TAG"

      - name: Commit and push release branch
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          BRANCH="${{ needs.prepare.outputs.branch }}"
          if git diff --quiet; then
            echo "No asset changes needed."
          else
            git add -A
            git commit -s -m "Kubeflow Trainer Official Release $TAG"
          fi
          git push origin "$BRANCH"

  publish_pypi:
    if: ${{ !cancelled() && !failure() }}
    needs:
      - prepare
      - build_python_api
      - create_tag
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: release
      url: https://pypi.org/project/kubeflow-trainer-api/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist-${{ needs.prepare.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          packages-dir: dist/

  create_tag:
    if: ${{ !cancelled() && !failure() }}
    needs:
      - prepare
      - update_release_branch
      - build_python_api
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Create and push tag
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists. Skipping"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

  github_release:
    if: ${{ !cancelled() && !failure() }}
    needs:
      - prepare
      - update_release_branch
      - create_tag
      - publish_pypi

    permissions:
      contents: write

    runs-on: ubuntu-latest
    environment:
      name: release

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Extract changelog
        if: needs.prepare.outputs.is-prerelease != 'true'
        id: changelog
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          CHANGELOG_FILE="CHANGELOG/CHANGELOG-${MAJOR_MINOR}.md"
          set -euo pipefail
          [[ -f "$CHANGELOG_FILE" ]] || { echo "ERROR: $CHANGELOG_FILE not found" >&2; exit 1; }
          HEADER_REGEX="^#\{1,2\} \\[v\?${VERSION//./\\.}\\]"
          SECTION=$(sed -n "/$HEADER_REGEX/,\$p" "$CHANGELOG_FILE")
          [[ -n "$SECTION" ]] || { echo "ERROR: No changelog section for v$VERSION in $CHANGELOG_FILE" >&2; exit 1; }
          NEXT_VERSION=$(echo "$SECTION" | tail -n +2 | grep -m1 "^#\{1,2\} \\[" || true)
          if [[ -n "$NEXT_VERSION" ]]; then
              CHANGELOG=$(echo "$SECTION" | sed '1d' | sed '/^#\{1,2\} \[/,$d')
          else
              CHANGELOG=$(echo "$SECTION" | sed '1d')
          fi
          [[ -n "$CHANGELOG" ]] || { echo "ERROR: Empty changelog body for v$VERSION in $CHANGELOG_FILE" >&2; exit 1; }
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ needs.prepare.outputs.tag }}"
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.branch }}
          prerelease: ${{ needs.prepare.outputs.is-prerelease == 'true' }}
          draft: false
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: false
