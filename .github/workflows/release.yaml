name: Release

on:
  push:
    branches:
      - master
      - release-*
    paths:
      - VERSION

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SEMVER_PATTERN: '^(v)?([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      branch: ${{ steps.vars.outputs.branch }}
      is-prerelease: ${{ steps.vars.outputs.is-prerelease }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version and set outputs
        id: vars
        run: |
          RAW_VERSION=$(cat VERSION | tr -d ' \n')
          VERSION=${RAW_VERSION#v}
          if [[ ! ${RAW_VERSION} =~ ${{ env.SEMVER_PATTERN }} ]]; then
            echo "Version '${RAW_VERSION}' does not match semver pattern."
            exit 1
          fi

          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          BRANCH="release-${MAJOR_MINOR}"
          TAG="v${VERSION}"
          IS_PRERELEASE=false
          if [[ ${VERSION} == *"-rc."* ]]; then
            IS_PRERELEASE=true
          fi

          echo "Version '${RAW_VERSION}' matches semver pattern."
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "is-prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

      - name: Ensure tag does not exist
        run: |
          git fetch --tags
          if git tag -l | grep -q "^${{ steps.vars.outputs.tag }}$"; then
            echo "Tag '${{ steps.vars.outputs.tag }}' already exists."
            exit 1
          fi

      - name: Check Helm chart version
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          CHART_VERSION=$(grep -E '^version:' charts/kubeflow-trainer/Chart.yaml | head -n1 | awk '{print $2}')
          if [ -z "$CHART_VERSION" ]; then
            echo "Chart version not found in charts/kubeflow-trainer/Chart.yaml"
            exit 1
          fi
          if [ "$CHART_VERSION" != "$VERSION" ]; then
            echo "Chart version ($CHART_VERSION) does not match VERSION ($VERSION)."
            exit 1
          fi
          echo "Chart version matches VERSION ($VERSION)."

      - name: Check Python API version
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          # Normalize semver RC format to PEP 440: 2.2.0-rc.1 -> 2.2.0rc1
          EXPECTED=$(echo "$VERSION" | sed 's/-rc\.\([0-9]*\)/rc\1/')
          PY_VER=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('api/python_api/kubeflow_trainer_api/__init__.py').read_text()
          m = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", text)
          if not m:
              raise SystemExit("__version__ not found")
          print(m.group(1))
          PY
          )
          echo "Expected: ${EXPECTED}; Package: ${PY_VER}"
          if [ "$PY_VER" != "$EXPECTED" ]; then
            echo "Python API version ($PY_VER) does not match expected ($EXPECTED)."
            exit 1
          fi
          echo "Python API version matches."

  tests:
    needs:
      - prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go unit tests
        run: make test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python unit tests
        run: make test-python

  build_python_api:
    needs:
      - prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build Python package
        working-directory: api/python_api
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ needs.prepare.outputs.version }}
          path: api/python_api/dist/

  update_release_branch:
    needs:
      - prepare
      - build_python_api
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Create or checkout release branch
        run: |
          BRANCH="${{ needs.prepare.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "Release branch $BRANCH already exists, checking it out."
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            echo "Creating release branch $BRANCH from $GITHUB_SHA"
            git checkout -b "$BRANCH" "$GITHUB_SHA"
          fi

      - name: Pin image tags and configMap version on release branch
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"

          # Update newTag in all manifest kustomization files.
          find manifests -type f -name '*.yaml' -exec sed -i "s/newTag: .*/newTag: $TAG/" {} +
          echo "Updated image tags in manifests to $TAG"

          # Pin ghcr.io image references from :latest to the release tag.
          CHANGED_FILES=$(grep -REl "ghcr\.io/kubeflow/trainer/[A-Za-z0-9._/-]+:latest" manifests || true)
          if [ -n "$CHANGED_FILES" ]; then
            while IFS= read -r f; do
              sed -i -E "s|(ghcr\.io/kubeflow/trainer/[A-Za-z0-9._/-]+):latest|\\1:${TAG}|g" "$f"
              echo "  Pinned $f"
            done <<< "$CHANGED_FILES"
          fi

          # Update configMapGenerator version in manager overlay.
          sed -i "s/kubeflow_trainer_version=.*/kubeflow_trainer_version=${TAG}/" \
            manifests/overlays/manager/kustomization.yaml
          echo "Updated configMapGenerator version to $TAG"

      - name: Commit and push release branch
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          BRANCH="${{ needs.prepare.outputs.branch }}"
          if git diff --quiet; then
            echo "No manifest changes needed."
          else
            git add manifests/
            git commit -s -m "Pin image tags and configMap version to $TAG"
          fi
          git push origin "$BRANCH"

  publish_pypi:
    if: ${{ !cancelled() && !failure() }}
    needs:
      - prepare
      - build_python_api
      - tests
      - update_release_branch
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: release
      url: https://pypi.org/project/kubeflow-trainer-api/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.prepare.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          packages-dir: dist/

  github_release:
    if: ${{ !cancelled() && !failure() }}
    needs:
      - prepare
      - update_release_branch
      - publish_pypi

    permissions:
      contents: write

    runs-on: ubuntu-latest
    environment:
      name: release

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >
            --unreleased
            --tag ${{ needs.prepare.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Create and push tag
        run: |
          TAG_SHA=$(git rev-parse HEAD)
          git tag -a "${{ needs.prepare.outputs.tag }}" "$TAG_SHA" -m "Kubeflow Trainer ${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "${{ needs.prepare.outputs.tag }}"
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.branch }}
          prerelease: ${{ needs.prepare.outputs.is-prerelease == 'true' }}
          draft: false
          body_path: ${{ steps.changelog.outputs.changelog }}

  trigger_builds:
    needs:
      - prepare
      - github_release
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Trigger image build for release tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-push-images.yaml',
              ref: '${{ needs.prepare.outputs.tag }}',
            })

      - name: Trigger Helm chart publish for release tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-helm-charts.yaml',
              ref: '${{ needs.prepare.outputs.tag }}',
            })
