name: Build and Publish Images

on:
  push:
    branches:
      - master
      - "release-*"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.repository == 'kubeflow/trainer'

    strategy:
      fail-fast: false
      matrix:
        component:
          - name: trainer-controller-manager
            dockerfile: cmd/trainer-controller-manager/Dockerfile
            x86_platforms: linux/amd64
            arm_platforms: linux/arm64

          - name: model-initializer
            dockerfile: cmd/initializers/model/Dockerfile
            x86_platforms: linux/amd64
            arm_platforms: linux/arm64

          - name: dataset-initializer
            dockerfile: cmd/initializers/dataset/Dockerfile
            x86_platforms: linux/amd64
            arm_platforms: linux/arm64

          - name: deepspeed-runtime
            dockerfile: cmd/runtimes/deepspeed/Dockerfile
            x86_platforms: linux/amd64
            arm_platforms: linux/arm64

          - name: xgboost-runtime
            dockerfile: cmd/runtimes/xgboost/Dockerfile
            x86_platforms: linux/amd64
            arm_platforms: linux/arm64

          # TODO (andreyvelich): mlx[cuda] doesn't support arm at the moment: https://github.com/ml-explore/mlx/issues/2469
          - name: mlx-runtime
            dockerfile: cmd/runtimes/mlx/Dockerfile
            x86_platforms: linux/amd64

          # TODO: (jaiakash) pytorch/pytorch CUDA base image does not support arm64
          # Check this https://github.com/orgs/pytorch/packages/container/pytorch/574847194?tag=2.9.1-cuda12.8-cudnn9-runtime
          - name: torchtune-trainer
            dockerfile: cmd/trainers/torchtune/Dockerfile
            x86_platforms: linux/amd64

          - name: data-cache
            dockerfile: cmd/data_cache/Dockerfile
            x86_platforms: linux/amd64
            arm_platforms: linux/arm64

        arch:
          - name: x86
            runs-on: oracle-vm-16cpu-64gb-x86-64
            platforms_key: x86_platforms

          - name: arm64
            runs-on: oracle-16cpu-64gb-arm64
            platforms_key: arm_platforms

        exclude:
          - component:
              name: mlx-runtime
            arch:
              name: arm64

          - component:
              name: torchtune-trainer
            arch:
              name: arm64

    uses: ./.github/workflows/publish-images.yaml
    with:
      component-name: ${{ matrix.component.name }}
      dockerfile: ${{ matrix.component.dockerfile }}
      platforms: ${{ matrix.component[matrix.arch.platforms_key] }}
      context: .
      runs-on: ${{ matrix.arch.runs-on }}

    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  merge-manifests:
    needs: build-and-publish
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: trainer-controller-manager
          - name: model-initializer
          - name: dataset-initializer
          - name: deepspeed-runtime
          - name: xgboost-runtime
          - name: mlx-runtime
          - name: torchtune-trainer
          - name: data-cache

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.component.name }}-*
          merge-multiple: true

      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Hub Login
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Add Docker Tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/kubeflow/trainer/${{ matrix.component.name }}
            docker.io/kubeflow/${{ matrix.component.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf 'ghcr.io/kubeflow/trainer/${{ matrix.component.name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/kubeflow/trainer/${{ matrix.component.name }}:${{ steps.meta.outputs.version }}
