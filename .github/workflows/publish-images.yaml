name: Build And Publish Container Images

on:
  workflow_call:
    inputs:
      component-name:
        required: true
        type: string
        description: "Name of the component to build"
      dockerfile:
        required: true
        type: string
        description: "Path to the Dockerfile"
      platforms:
        required: true
        type: string
        description: "Platforms to build for (e.g., linux/amd64)"
      context:
        required: false
        type: string
        default: "."
        description: "Build context"
      runs-on:
        required: true
        type: string
        description: "Runner label to execute on"
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build ${{ inputs.component-name }} (${{ inputs.runs-on }})
    runs-on: ${{ inputs.runs-on }}
    env:
      SHOULD_PUBLISH: ${{ github.event_name == 'push' }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: GHCR Login
        if: env.SHOULD_PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Hub Login
        if: env.SHOULD_PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build and push by digest only (no tags). Tags are created in the merge job.
      - name: Build and Push (by digest)
        if: env.SHOULD_PUBLISH == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          cache-from: type=gha,scope=${{ inputs.component-name }}-${{ inputs.runs-on }}
          cache-to: type=gha,mode=max,scope=${{ inputs.component-name }}-${{ inputs.runs-on }},ignore-error=true
          outputs: |
            type=image,name=ghcr.io/kubeflow/trainer/${{ inputs.component-name }},push-by-digest=true,name-canonical=true,push=true

      # On PRs, only validate the build (no push, no digest export).
      - name: Build (PR validation)
        if: env.SHOULD_PUBLISH != 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ inputs.component-name }}-${{ inputs.runs-on }}

      - name: Export digest
        if: env.SHOULD_PUBLISH == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: env.SHOULD_PUBLISH == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ inputs.component-name }}-${{ inputs.runs-on }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
