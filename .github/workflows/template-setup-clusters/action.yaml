name: Setup E2E Cluster
description: Checks out code, sets up Go and Python, installs dependencies, and creates a Kind cluster

inputs:
  cluster_type:
    description: Type of cluster to setup (cpu or gpu)
    required: false
    default: cpu
  kubernetes_version:
    description: Kubernetes version for the cluster
    required: true

runs:
  using: "composite"
  steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        path: ${{ env.GOPATH }}/src/github.com/kubeflow/trainer

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: ${{ env.GOPATH }}/src/github.com/kubeflow/trainer/go.mod

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: 3.12

    - name: Install dependencies
      shell: bash
      run: |
        echo "Install Papermill"
        pip install papermill==2.6.0 jupyter==1.1.1 ipykernel==6.29.5

        echo "Install Kubeflow SDK with Docker support for local Notebooks"
        pip install "kubeflow[docker] @ git+https://github.com/kubeflow/sdk.git@main"

    - name: Setup cluster
      shell: bash
      env:
        CLUSTER_TYPE: ${{ inputs.cluster_type }}
      run: |
        make test-e2e-setup-cluster K8S_VERSION=${{ inputs.kubernetes_version }}
