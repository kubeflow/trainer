name: Validate Python Lockfiles

on:
  pull_request:
    paths:
      - 'cmd/initializers/dataset/pyproject.toml'
      - 'cmd/initializers/dataset/uv.lock'
      - 'cmd/initializers/dataset/requirements.txt'
      - 'cmd/initializers/model/pyproject.toml'
      - 'cmd/initializers/model/uv.lock'
      - 'cmd/initializers/model/requirements.txt'
      - 'api/python_api/pyproject.toml'
      - 'api/python_api/uv.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-lockfiles:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfiles are in sync
        run: |
          set -euo pipefail

          LOCKFILE_DIRS=(
            "cmd/initializers/dataset"
            "cmd/initializers/model"
            "api/python_api"
          )

          FAILED=false

          for dir in "${LOCKFILE_DIRS[@]}"; do
            echo "=== Checking $dir/uv.lock ==="
            cd "$dir"
            if ! uv lock --check; then
              echo "::error title=Lockfile Out of Sync::$dir/uv.lock is out of sync with pyproject.toml."
              echo "Run 'uv lock' in $dir and commit the changes."
              FAILED=true
            else
              echo "In sync"
            fi
            cd - > /dev/null
          done

          if [ "$FAILED" = true ]; then
            echo ""
            echo "One or more lockfiles are out of sync. To fix:"
            echo "  cd cmd/initializers/dataset && uv lock"
            echo "  cd cmd/initializers/model && uv lock"
            echo "  cd api/python_api && uv lock"
            exit 1
          fi

check-security-regressions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        directory:
          - cmd/initializers/dataset
          - cmd/initializers/model
          - api/python_api

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          path: pr-code

      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          path: base-code

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Audit PR branch lockfile
        run: |
          cd pr-code/${{ matrix.directory }}
          rc=0
          uv audit --preview-features audit > ../../../audit-pr.txt 2>&1 || rc=$?
          cat ../../../audit-pr.txt
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "::error::uv audit failed in ${{ matrix.directory }} with exit code $rc"
            exit 1
          fi

      - name: Audit base branch lockfile
        run: |
          cd base-code/${{ matrix.directory }}
          rc=0
          uv audit --preview-features audit > ../../../audit-base.txt 2>&1 || rc=$?
          cat ../../../audit-base.txt
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "::error::uv audit failed in ${{ matrix.directory }} with exit code $rc"
            exit 1
          fi
