{{- if eq (include "trainer.runtimes.enabled" .) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "trainer.runtimes.installer.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trainer.runtimes.installer.labels" . | nindent 4 }}
  annotations:
    # Run after the CRDs and controller are installed/upgraded so that the
    # ClusterTrainingRuntime type is registered before we apply the runtimes.
    "helm.sh/hook": post-install,post-upgrade
    # `before-hook-creation` guarantees a fresh Job on every upgrade (Job specs
    # are immutable); `hook-succeeded` cleans it up once it completes. Failed
    # Jobs are intentionally retained for troubleshooting.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "trainer.runtimes.installer.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "trainer.runtimes.installer.name" . }}
      {{- with .Values.runtimes.installer.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: apply-runtimes
          image: "{{ .Values.runtimes.installer.image.registry }}/{{ .Values.runtimes.installer.image.repository }}:{{ .Values.runtimes.installer.image.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Apply the enabled built-in runtimes.
              kubectl apply --server-side --force-conflicts -f /manifests/runtimes.yaml
              kubectl label --overwrite -f /manifests/runtimes.yaml trainer.kubeflow.org/managed-by=runtimes-installer
              # Prune: delete runtimes we own that are no longer in the manifest.
              desired="$(kubectl apply -f /manifests/runtimes.yaml --dry-run=client -o name)"
              for res in $(kubectl get clustertrainingruntime -l trainer.kubeflow.org/managed-by=runtimes-installer -o name); do
                echo "$desired" | grep -qx "$res" || kubectl delete "$res" --ignore-not-found
              done
          volumeMounts:
            - name: manifests
              mountPath: /manifests
              readOnly: true
          {{- with .Values.runtimes.installer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: manifests
          configMap:
            name: {{ include "trainer.runtimes.installer.name" . }}
      {{- with .Values.runtimes.installer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runtimes.installer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runtimes.installer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
