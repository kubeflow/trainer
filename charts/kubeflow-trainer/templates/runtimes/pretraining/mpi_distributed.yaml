{{- if .Values.runtime.preTraining.mpiDistributed.enable -}}
apiVersion: trainer.kubeflow.org/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  name: mpi-distributed
  labels:
    training.kubeflow.org/phase: pre-training
spec:
  mlPolicy:
    numNodes: 1
    mpi:
      numProcPerNode: 1
      mpiImplementation: OpenMPI
      sshAuthMountPath: /root/.ssh
  template:
    spec:
      startupPolicy:
        startupPolicyOrder: InOrder
      replicatedJobs:
        - name: launcher
          template:
            spec:
              template:
                spec:
                  containers:
                    - name: launcher
                      image: {{ include "trainer.runtime.preTraining.mpiDistributed.image" . }}
                      command:
                        - /bin/sh
                        - -c
                        - "echo 'launcher runs for 10 seconds' && sleep 100"
        - name: trainer-node
          template:
            spec:
              template:
                spec:
                  containers:
                    - name: trainer
                      image: {{ include "trainer.runtime.preTraining.mpiDistributed.image" . }}
                      command:
                        - /bin/sh
                        - -c
                        - "echo 'launcher runs for 10 seconds' && sleep 100"
{{- end }}
