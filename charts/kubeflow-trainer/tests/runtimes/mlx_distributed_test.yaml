suite: Test mlx-distributed runtime in installer ConfigMap
templates:
  - templates/runtimes/configmap.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not render the installer ConfigMap when no runtime is enabled
    set:
      runtimes:
        mlxDistributed:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should include mlx-distributed when enabled
    set:
      runtimes:
        mlxDistributed:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "name: mlx-distributed"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "trainer.kubeflow.org/framework: mlx"

  - it: Should include mlx-distributed when runtimes.defaultEnabled is true
    set:
      runtimes:
        defaultEnabled: true
    asserts:
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "name: mlx-distributed"

  - it: Should use custom image tag when specified
    set:
      runtimes:
        mlxDistributed:
          enabled: true
          image:
            tag: v1.0.0
    asserts:
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "image: ghcr.io/kubeflow/trainer/mlx-runtime:v1.0.0"