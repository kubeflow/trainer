suite: Test runtimes installer Job, cleanup Job and RBAC
templates:
  - templates/runtimes/installer-job.yaml
  - templates/runtimes/cleanup-job.yaml
  - templates/runtimes/rbac.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not render the installer Job when no runtime is enabled
    template: templates/runtimes/installer-job.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render the installer Job as a post-install/post-upgrade hook
    template: templates/runtimes/installer-job.yaml
    set:
      runtimes:
        defaultEnabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded
      - equal:
          path: spec.template.spec.serviceAccountName
          value: kubeflow-trainer-runtimes-installer
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.k8s.io/kubectl:v1.36.0

  - it: Should reconcile runtimes with a server-side apply
    template: templates/runtimes/installer-job.yaml
    set:
      runtimes:
        defaultEnabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: --server-side
      - contains:
          path: spec.template.spec.containers[0].command
          content: --force-conflicts

  - it: Should render the cleanup Job as a pre-delete hook
    template: templates/runtimes/cleanup-job.yaml
    set:
      runtimes:
        defaultEnabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-delete
      - contains:
          path: spec.template.spec.containers[0].command
          content: delete
      - contains:
          path: spec.template.spec.containers[0].command
          content: clustertrainingruntime
      - contains:
          path: spec.template.spec.containers[0].command
          content: --selector=trainer.kubeflow.org/managed-by=runtimes-installer

  - it: Should grant the installer permission to reconcile ClusterTrainingRuntimes
    template: templates/runtimes/rbac.yaml
    set:
      runtimes:
        defaultEnabled: true
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: kind
          value: ClusterRole
        documentIndex: 1
      - equal:
          path: rules[0].resources
          value:
            - clustertrainingruntimes
        documentIndex: 1
      - contains:
          path: rules[0].verbs
          content: create
        documentIndex: 1
      - contains:
          path: rules[0].verbs
          content: delete
        documentIndex: 1
