suite: Test torch-distributed-with-cache runtime in installer ConfigMap
templates:
  - templates/runtimes/configmap.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not include the runtime when torchDistributedWithCache is disabled
    set:
      dataCache:
        enabled: true
        runtimes:
          torchDistributedWithCache:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should fail when torchDistributedWithCache is enabled but dataCache is disabled
    set:
      dataCache:
        enabled: false
        runtimes:
          torchDistributedWithCache:
            enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "dataCache.runtimes.torchDistributedWithCache.enabled requires dataCache.enabled to be true"

  - it: Should include torch-distributed-with-cache when enabled and dataCache is enabled
    set:
      dataCache:
        enabled: true
        cacheImage:
          tag: v1.0.0
        runtimes:
          torchDistributedWithCache:
            enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "name: torch-distributed-with-cache"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "trainer.kubeflow.org/managed-by: runtimes-installer"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "serviceAccountName: kubeflow-trainer-cache-initializer"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "ghcr.io/kubeflow/trainer/data-cache:v1.0.0"
