suite: Test xgboost-distributed runtime in installer ConfigMap
templates:
  - templates/runtimes/configmap.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not render the installer ConfigMap when no runtime is enabled
    set:
      runtimes:
        xgboostDistributed:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should include xgboost-distributed when runtimes.xgboostDistributed.enabled is true
    set:
      runtimes:
        xgboostDistributed:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "name: xgboost-distributed"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "trainer.kubeflow.org/framework: xgboost"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "trainer.kubeflow.org/managed-by: runtimes-installer"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "trainer.kubeflow.org/webhook-validation: disabled"

  - it: Should include xgboost-distributed when runtimes.defaultEnabled is true
    set:
      runtimes:
        defaultEnabled: true
    asserts:
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "name: xgboost-distributed"

  - it: Should use custom image tag when specified
    set:
      runtimes:
        xgboostDistributed:
          enabled: true
          image:
            tag: v1.0.0
    asserts:
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "image: ghcr.io/kubeflow/trainer/xgboost-runtime:v1.0.0"
