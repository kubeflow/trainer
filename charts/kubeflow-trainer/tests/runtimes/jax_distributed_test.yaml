suite: Test jax-distributed ClusterTrainingRuntime
templates:
  - templates/runtimes/jax-distributed.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not render ClusterTrainingRuntime when runtimes.jaxDistributed.enabled is false
    set:
      runtimes:
        jaxDistributed:
          enabled: false
          image:
            registry: nvcr.io
            repository: nvidia/jax
            tag: "25.10-py3"
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render ClusterTrainingRuntime when runtimes.jaxDistributed.enabled is true
    set:
      runtimes:
        jaxDistributed:
          enabled: true
          image:
            registry: nvcr.io
            repository: nvidia/jax
            tag: "25.10-py3"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterTrainingRuntime
      - equal:
          path: metadata.name
          value: jax-distributed

  - it: Should have correct framework label
    set:
      runtimes:
        jaxDistributed:
          enabled: true
          image:
            registry: nvcr.io
            repository: nvidia/jax
            tag: "25.10-py3"
    asserts:
      - equal:
          path: metadata.labels["trainer.kubeflow.org/framework"]
          value: jax

  - it: Should have correct mlPolicy configuration
    set:
      runtimes:
        jaxDistributed:
          enabled: true
          image:
            registry: nvcr.io
            repository: nvidia/jax
            tag: "25.10-py3"
    asserts:
      - equal:
          path: spec.mlPolicy.numNodes
          value: 1
      - equal:
          path: spec.mlPolicy.jax
          value: {}

  - it: Should use default JAX image
    set:
      runtimes:
        jaxDistributed:
          enabled: true
          image:
            registry: nvcr.io
            repository: nvidia/jax
            tag: "25.10-py3"
    asserts:
      - equal:
          path: spec.template.spec.replicatedJobs[0].template.spec.template.spec.containers[0].image
          value: nvcr.io/nvidia/jax:25.10-py3

  - it: Should use custom image tag when specified
    set:
      runtimes:
        jaxDistributed:
          enabled: true
          image:
            registry: nvcr.io
            repository: nvidia/jax
            tag: "25.01-py3"
    asserts:
      - equal:
          path: spec.template.spec.replicatedJobs[0].template.spec.template.spec.containers[0].image
          value: nvcr.io/nvidia/jax:25.01-py3

  - it: Should have node replicatedJob with correct container name
    set:
      runtimes:
        jaxDistributed:
          enabled: true
          image:
            registry: nvcr.io
            repository: nvidia/jax
            tag: "25.10-py3"
    asserts:
      - equal:
          path: spec.template.spec.replicatedJobs[0].name
          value: node
      - equal:
          path: spec.template.spec.replicatedJobs[0].template.spec.template.spec.containers[0].name
          value: node