suite: Test torchtune-llama3.2-3b runtime in installer ConfigMap
templates:
  - templates/runtimes/configmap.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not render the installer ConfigMap when no runtime is enabled
    set:
      runtimes:
        torchtuneDistributed:
          llama3_2_3B:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should include torchtune-llama3.2-3b when enabled
    set:
      runtimes:
        torchtuneDistributed:
          llama3_2_3B:
            enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "name: torchtune-llama3.2-3b"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "trainer.kubeflow.org/framework: torchtune"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "trainer.kubeflow.org/managed-by: runtimes-installer"
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "hf://meta-llama/Llama-3.2-3B-Instruct"

  - it: Should use custom trainer image tag when specified
    set:
      runtimes:
        torchtuneDistributed:
          image:
            tag: v1.0.0
          llama3_2_3B:
            enabled: true
    asserts:
      - matchRegex:
          path: data["runtimes.yaml"]
          pattern: "image: ghcr.io/kubeflow/trainer/torchtune-trainer:v1.0.0"
