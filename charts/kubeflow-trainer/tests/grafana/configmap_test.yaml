suite: Test Grafana dashboard ConfigMap
templates:
  - templates/grafana/configmap.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not render ConfigMap when grafanaDashboard.enabled is false
    set:
      grafanaDashboard:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render ConfigMap when grafanaDashboard.enabled is true
    set:
      grafanaDashboard:
        enabled: true
        labels:
          grafana_dashboard: "1"
        annotations: {}
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: kubeflow-trainer-grafana-dashboard

  - it: Should have grafana_dashboard label for sidecar auto-discovery
    set:
      grafanaDashboard:
        enabled: true
        labels:
          grafana_dashboard: "1"
        annotations: {}
    asserts:
      - equal:
          path: metadata.labels["grafana_dashboard"]
          value: "1"

  - it: Should have app.kubernetes.io/component label
    set:
      grafanaDashboard:
        enabled: true
        labels:
          grafana_dashboard: "1"
        annotations: {}
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: grafana-dashboard

  - it: Should contain dashboard JSON data key
    set:
      grafanaDashboard:
        enabled: true
        labels:
          grafana_dashboard: "1"
        annotations: {}
    asserts:
      - isNotEmpty:
          path: data["kubeflow-trainer-dashboard.json"]

  - it: Should support custom annotations
    set:
      grafanaDashboard:
        enabled: true
        labels:
          grafana_dashboard: "1"
        annotations:
          grafana_folder: "Kubeflow"
    asserts:
      - equal:
          path: metadata.annotations.grafana_folder
          value: "Kubeflow"

  - it: Should support custom labels
    set:
      grafanaDashboard:
        enabled: true
        labels:
          grafana_dashboard: "1"
          custom-label: "custom-value"
        annotations: {}
    asserts:
      - equal:
          path: metadata.labels["custom-label"]
          value: "custom-value"
