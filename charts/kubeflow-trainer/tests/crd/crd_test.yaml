suite: Test CRDs

templates:
  - crd/trainer.kubeflow.org_trainjobs.yaml
  - crd/trainer.kubeflow.org_trainingruntimes.yaml
  - crd/trainer.kubeflow.org_clustertrainingruntimes.yaml

release:
  name: kubeflow-trainer
  namespace: kubeflow-system

tests:
  - it: Should render the TrainJob CRD as a template so it is reconciled on helm upgrade
    template: crd/trainer.kubeflow.org_trainjobs.yaml
    set:
      crds:
        enabled: true
    asserts:
      - containsDocument:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          name: trainjobs.trainer.kubeflow.org

  - it: Should render the TrainingRuntime CRD as a template so it is reconciled on helm upgrade
    template: crd/trainer.kubeflow.org_trainingruntimes.yaml
    set:
      crds:
        enabled: true
    asserts:
      - containsDocument:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          name: trainingruntimes.trainer.kubeflow.org

  - it: Should render the ClusterTrainingRuntime CRD as a template so it is reconciled on helm upgrade
    template: crd/trainer.kubeflow.org_clustertrainingruntimes.yaml
    set:
      crds:
        enabled: true
    asserts:
      - containsDocument:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          name: clustertrainingruntimes.trainer.kubeflow.org

  - it: Should not render the CRDs by default (crds.enabled is false)
    asserts:
      - hasDocuments:
          count: 0
