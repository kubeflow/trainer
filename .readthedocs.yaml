# ReadTheDocs build configuration
# Kubeflow Trainer Documentation System

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      # Generate CRD API reference before Sphinx build
      # Note: This requires crddoc to be installed or available in the build environment
      # For now, we'll use make target that can be stubbed if crddoc is not yet available
      - make docs-api-reference || echo "CRD API reference generation skipped (crddoc not available)"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

python:
  install:
    - requirements: docs/requirements.txt
