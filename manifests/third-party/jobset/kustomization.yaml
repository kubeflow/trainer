apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/kubernetes-sigs/jobset/releases/download/v0.12.0/manifests.yaml

images:
  - name: us-central1-docker.pkg.dev/k8s-staging-images/jobset/jobset
    newName: registry.k8s.io/jobset/jobset
    newTag: v0.12.0

# Add required patches.
patches:
  # Remove namespace from the JobSet release manifests.
  - path: patches/jobset_remove_namespace.yaml
    target:
      group: ""
      version: v1
      kind: Namespace
