# ServiceMonitor for the Kubeflow Trainer controller-manager metrics endpoint.
# Requires the Prometheus Operator (monitoring.coreos.com/v1) to be installed.
# If Prometheus Operator is not available, remove this resource from kustomization.yaml.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubeflow-trainer-controller-manager
  namespace: kubeflow
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: manager
  namespaceSelector:
    matchNames:
      - kubeflow
  endpoints:
    - port: monitoring-port
      path: /metrics
      scheme: https
      interval: 30s
      scrapeTimeout: 10s
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        insecureSkipVerify: true
