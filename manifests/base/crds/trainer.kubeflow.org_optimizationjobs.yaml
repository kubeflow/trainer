                    format: int32
                    minimum: 1
                    type: integer
                  parallelTrials:
                    format: int32
                    minimum: 1
                    type: integer
                type: object
                x-kubernetes-validations:
                - message: parallelTrials cannot exceed numTrials
                  rule: '!has(self.parallelTrials) || !has(self.numTrials) || self.parallelTrials
