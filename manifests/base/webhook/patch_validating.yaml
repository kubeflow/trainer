- op: replace
  path: /webhooks/0/clientConfig/service/name
  value: kubeflow-trainer-controller-manager
- op: replace
  path: /webhooks/1/clientConfig/service/name
  value: kubeflow-trainer-controller-manager
- op: replace
  path: /webhooks/2/clientConfig/service/name
  value: kubeflow-trainer-controller-manager
- op: replace
  path: /metadata/name
  value: validator.trainer.kubeflow.org
- op: add
  path: /webhooks/0/objectSelector
  value:
    matchExpressions:
      - key: trainer.kubeflow.org/webhook-validation
        operator: NotIn
        values:
          - disabled
- op: add
  path: /webhooks/1/objectSelector
  value:
    matchExpressions:
      - key: trainer.kubeflow.org/webhook-validation
        operator: NotIn
        values:
          - disabled
