apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/runtimes

# The built-in ClusterTrainingRuntime are validated ahead of time.
labels:
  - pairs:
      trainer.kubeflow.org/webhook-validation: disabled
    includeSelectors: false

# Update the Kubeflow LLM Trainer image tag.
images:
  - name: ghcr.io/kubeflow/trainer/torchtune-trainer
    newTag: latest
  - name: ghcr.io/kubeflow/trainer/dataset-initializer
    newTag: latest
  - name: ghcr.io/kubeflow/trainer/model-initializer
    newTag: latest
  - name: ghcr.io/kubeflow/trainer/mlx-runtime
    newTag: latest
  - name: ghcr.io/kubeflow/trainer/deepspeed-runtime
    newTag: latest
  - name: ghcr.io/kubeflow/trainer/xgboost-runtime
    newTag: latest
