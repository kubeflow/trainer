# Example 1: Multi-Node Distributed Training
#
# Multi-node distributed training using the torch-distributed
# ClusterTrainingRuntime. Uses the runtime's default PyTorch image.
#
# The trainer controller injects PET_* env vars (PET_NNODES,
# PET_NPROC_PER_NODE, PET_NODE_RANK, PET_MASTER_ADDR, PET_MASTER_PORT) which
# torchrun uses to configure the rendezvous.
#
# Apply: kubectl apply -f 01-multi-node.yaml
# Check: kubectl get trainjob multi-node-example
# Pods:  kubectl get pods -l jobset.sigs.k8s.io/jobset-name=multi-node-example
# Logs:  kubectl logs -l jobset.sigs.k8s.io/jobset-name=multi-node-example
# Clean: kubectl delete trainjob multi-node-example

apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: multi-node-example
  namespace: default
spec:
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: ClusterTrainingRuntime
    name: torch-distributed

  trainer:
    numNodes: 3
    command:
      - python3
      - -c
      - |
        import os
        import time

        keys = (
            "PET_NNODES",
            "PET_NPROC_PER_NODE",
            "PET_NODE_RANK",
            "PET_MASTER_ADDR",
            "PET_MASTER_PORT",
        )
        for k in keys:
            print(f"{k}: {os.getenv(k, 'not set')}")

        node_rank = os.getenv("PET_NODE_RANK", "0")
        for i in range(1, 6):
            print(f"Epoch {i}: batch on node rank {node_rank}")
            time.sleep(2)
        print(f"Training complete on node rank {node_rank}")
