apiVersion: trainer.kubeflow.org/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  name: flux-distributed
  labels:
    trainer.kubeflow.org/framework: flux
    trainer.kubeflow.org/webhook-validation: disabled
spec:
  mlPolicy:
    numNodes: 1
    flux: {}
  template:
    spec:
      replicatedJobs:
        - name: node
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
            spec:
              template:
                spec:
                  # An init container will be added here to install flux
                  containers:
                    - name: node
                      image: ubuntu:jammy
